<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOCFL Practice Pro - Band B1</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .editor-content:focus {
            outline: none;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }
        .active-q {
            background-color: #059669 !important;
            color: white !important;
            transform: scale(1.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        .answered-q {
            background-color: #D1FAE5 !important;
            color: #065F46 !important;
            border-color: #A7F3D0 !important;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex text-gray-800">

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col border-r border-gray-200 bg-white overflow-hidden">
        <!-- Header -->
        <header class="h-16 border-b border-gray-100 flex items-center justify-between px-8 bg-white shrink-0 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500 p-2 rounded-lg text-white">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">TOCFL Practice <span class="text-emerald-600 font-medium">Band B1</span></h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="timer-container" class="flex items-center gap-2 px-4 py-1.5 rounded-full font-mono text-lg font-semibold bg-gray-50 text-gray-700">
                    <i data-lucide="clock" class="w-5 h-5"></i>
                    <span id="timer">60:00</span>
                </div>
                <button onclick="resetPractice()" class="flex items-center gap-2 text-sm text-gray-400 hover:text-red-600 transition-colors">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    Reset
                </button>
            </div>
        </header>

        <!-- Question Grid -->
        <div class="p-6 bg-gray-50 border-b border-gray-200 shrink-0">
            <div id="question-grid" class="grid grid-cols-10 gap-2 max-w-4xl mx-auto">
                <!-- Grid items will be injected here -->
            </div>
        </div>

        <!-- Question Area -->
        <div class="flex-1 overflow-y-auto p-8 flex flex-col items-center">
            <div class="w-full max-w-3xl space-y-8">
                <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                    <h2 id="question-title" class="text-3xl font-serif italic text-gray-900">Câu 1</h2>
                    <div id="status-badge" class="text-sm font-medium text-gray-400">Chưa trả lời</div>
                </div>

                <!-- Media Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Image Upload -->
                    <div class="space-y-4">
                        <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-gray-300 rounded-xl hover:border-emerald-500 hover:bg-emerald-50 transition-all cursor-pointer group relative overflow-hidden">
                            <div id="image-placeholder" class="flex flex-col items-center gap-2 text-gray-400 group-hover:text-emerald-600">
                                <i data-lucide="image" class="w-10 h-10"></i>
                                <span class="text-sm font-medium">Tải ảnh lên</span>
                            </div>
                            <img id="image-preview" class="hidden w-full h-full object-contain p-2" src="" alt="Preview">
                            <input type="file" id="image-input" class="hidden" accept="image/*">
                        </label>
                    </div>

                    <!-- Audio Upload -->
                    <div class="space-y-4">
                        <div class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-gray-300 rounded-xl hover:border-emerald-500 hover:bg-emerald-50 transition-all cursor-pointer group relative overflow-hidden">
                            <div id="audio-placeholder" class="flex flex-col items-center gap-2 text-gray-400 group-hover:text-emerald-600">
                                <i data-lucide="headphones" class="w-10 h-10"></i>
                                <span class="text-sm font-medium">Tải âm thanh lên</span>
                            </div>
                            <div id="audio-player-container" class="hidden w-full p-4 flex flex-col items-center gap-4">
                                <i data-lucide="headphones" class="w-10 h-10 text-emerald-600"></i>
                                <audio id="audio-player" controls class="w-full h-10"></audio>
                            </div>
                            <input type="file" id="audio-input" class="hidden" accept="audio/*">
                        </div>
                    </div>
                </div>

                <!-- Options -->
                <div class="flex flex-col gap-4 pt-4">
                    <p class="text-sm font-semibold uppercase tracking-wider text-gray-400">Chọn đáp án</p>
                    <div class="grid grid-cols-4 gap-4" id="options-container">
                        <button onclick="selectOption('A')" id="opt-A" class="option-btn py-6 rounded-xl text-2xl font-bold transition-all duration-200 border-2 bg-white text-gray-700 border-gray-200 hover:border-emerald-400 hover:bg-emerald-50">A</button>
                        <button onclick="selectOption('B')" id="opt-B" class="option-btn py-6 rounded-xl text-2xl font-bold transition-all duration-200 border-2 bg-white text-gray-700 border-gray-200 hover:border-emerald-400 hover:bg-emerald-50">B</button>
                        <button onclick="selectOption('C')" id="opt-C" class="option-btn py-6 rounded-xl text-2xl font-bold transition-all duration-200 border-2 bg-white text-gray-700 border-gray-200 hover:border-emerald-400 hover:bg-emerald-50">C</button>
                        <button onclick="selectOption('D')" id="opt-D" class="option-btn py-6 rounded-xl text-2xl font-bold transition-all duration-200 border-2 bg-white text-gray-700 border-gray-200 hover:border-emerald-400 hover:bg-emerald-50">D</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Navigation -->
        <footer class="h-20 border-t border-gray-200 px-8 flex items-center justify-between bg-white shrink-0">
            <button onclick="prevQuestion()" id="prev-btn" class="flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium text-gray-600 hover:bg-gray-100 disabled:opacity-30 transition-all">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                Quay lại
            </button>
            
            <div id="progress-text" class="text-sm font-medium text-gray-400">
                Tiến độ: 0 / 30
            </div>

            <button onclick="nextQuestion()" id="next-btn" class="flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-30 transition-all shadow-md">
                Tiếp tục
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </footer>
    </main>

    <!-- Sidebar: Notes -->
    <aside class="w-80 flex flex-col bg-white shadow-2xl z-20 shrink-0">
        <div class="h-16 border-b border-gray-100 flex items-center px-6 bg-gray-50/50 shrink-0">
            <h2 class="font-bold text-gray-700 flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4 text-emerald-600"></i>
                Ghi chú cá nhân
            </h2>
        </div>
        
        <div class="flex items-center gap-1 p-2 border-b border-gray-100 bg-white shrink-0">
            <button onclick="format('bold')" class="p-2 hover:bg-gray-100 rounded transition-colors" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
            <button onclick="format('italic')" class="p-2 hover:bg-gray-100 rounded transition-colors" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>
            <button onclick="format('underline')" class="p-2 hover:bg-gray-100 rounded transition-colors" title="Underline"><i data-lucide="underline" class="w-4 h-4"></i></button>
            <div class="flex-1"></div>
            <div class="p-2 text-emerald-600" title="Đã lưu tự động">
                <i data-lucide="save" class="w-4 h-4"></i>
            </div>
        </div>

        <div id="editor" contenteditable="true" class="flex-1 p-6 editor-content overflow-y-auto text-sm leading-relaxed text-gray-600" placeholder="Nhập ghi chú tại đây..."></div>
        
        <div class="p-4 bg-gray-50 border-t border-gray-100 shrink-0">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold text-center">
                Tự động lưu vào trình duyệt
            </p>
        </div>
    </aside>

    <script>
        // State Management
        let currentQuestion = 0;
        const totalQuestions = 30;
        let answers = JSON.parse(localStorage.getItem('tocfl_answers') || '{}');
        let notes = localStorage.getItem('tocfl_notes') || '';
        let timeLeft = 60 * 60;
        let imageUrls = {};
        let audioUrls = {};

        // Initialize Lucide Icons
        lucide.createIcons();

        // Initialize Grid
        const gridContainer = document.getElementById('question-grid');
        for (let i = 0; i < totalQuestions; i++) {
            const btn = document.createElement('button');
            btn.id = `grid-btn-${i}`;
            btn.innerText = i + 1;
            btn.className = 'w-8 h-8 rounded-md text-xs font-medium transition-all duration-200 flex items-center justify-center bg-white text-gray-400 border border-gray-200 hover:border-emerald-400 hover:text-emerald-600';
            btn.onclick = () => goToQuestion(i);
            gridContainer.appendChild(btn);
        }

        // Timer Logic
        const timerDisplay = document.getElementById('timer');
        const timerContainer = document.getElementById('timer-container');
        setInterval(() => {
            if (timeLeft <= 0) return;
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.innerText = `${m}:${s < 10 ? '0' + s : s}`;
            
            if (timeLeft < 300) {
                timerContainer.classList.add('bg-red-50', 'text-red-600', 'animate-pulse');
            }
        }, 1000);

        // Editor Logic
        const editor = document.getElementById('editor');
        editor.innerHTML = notes;
        editor.oninput = () => {
            localStorage.setItem('tocfl_notes', editor.innerHTML);
        };

        function format(cmd) {
            document.execCommand(cmd, false, null);
        }

        // Question Navigation
        function loadQuestion() {
            document.getElementById('question-title').innerText = `Câu ${currentQuestion + 1}`;
            
            // Update Grid Styles
            for (let i = 0; i < totalQuestions; i++) {
                const btn = document.getElementById(`grid-btn-${i}`);
                btn.classList.remove('active-q', 'answered-q');
                if (answers[i]) btn.classList.add('answered-q');
                if (i === currentQuestion) btn.classList.add('active-q');
            }

            // Update Status Badge
            const badge = document.getElementById('status-badge');
            if (answers[currentQuestion]) {
                badge.innerHTML = `<span class="flex items-center gap-1 text-emerald-600 font-medium"><i data-lucide="check-circle-2" class="w-4 h-4"></i> Đã trả lời: ${answers[currentQuestion]}</span>`;
            } else {
                badge.innerText = 'Chưa trả lời';
            }
            lucide.createIcons();

            // Update Options
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'border-emerald-600', 'shadow-lg', 'scale-105');
                const opt = btn.id.split('-')[1];
                if (answers[currentQuestion] === opt) {
                    btn.classList.add('bg-emerald-600', 'text-white', 'border-emerald-600', 'shadow-lg', 'scale-105');
                }
            });

            // Update Media
            const imgPreview = document.getElementById('image-preview');
            const imgPlaceholder = document.getElementById('image-placeholder');
            if (imageUrls[currentQuestion]) {
                imgPreview.src = imageUrls[currentQuestion];
                imgPreview.classList.remove('hidden');
                imgPlaceholder.classList.add('hidden');
            } else {
                imgPreview.classList.add('hidden');
                imgPlaceholder.classList.remove('hidden');
            }

            const audioPlayer = document.getElementById('audio-player');
            const audioContainer = document.getElementById('audio-player-container');
            const audioPlaceholder = document.getElementById('audio-placeholder');
            if (audioUrls[currentQuestion]) {
                audioPlayer.src = audioUrls[currentQuestion];
                audioContainer.classList.remove('hidden');
                audioPlaceholder.classList.add('hidden');
            } else {
                audioContainer.classList.add('hidden');
                audioPlaceholder.classList.remove('hidden');
            }

            // Update Progress
            document.getElementById('progress-text').innerText = `Tiến độ: ${Object.keys(answers).length} / ${totalQuestions}`;

            // Update Buttons
            document.getElementById('prev-btn').disabled = currentQuestion === 0;
            document.getElementById('next-btn').disabled = currentQuestion === totalQuestions - 1;
        }

        function goToQuestion(index) {
            currentQuestion = index;
            loadQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < totalQuestions - 1) {
                currentQuestion++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function selectOption(opt) {
            answers[currentQuestion] = opt;
            localStorage.setItem('tocfl_answers', JSON.stringify(answers));
            loadQuestion();
        }

        // File Uploads
        document.getElementById('image-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                imageUrls[currentQuestion] = URL.createObjectURL(file);
                loadQuestion();
            }
        };

        document.getElementById('audio-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                audioUrls[currentQuestion] = URL.createObjectURL(file);
                loadQuestion();
            }
        };

        function resetPractice() {
            if (confirm('Bạn có chắc chắn muốn xóa toàn bộ kết quả và làm lại từ đầu?')) {
                answers = {};
                localStorage.removeItem('tocfl_answers');
                localStorage.removeItem('tocfl_notes');
                editor.innerHTML = '';
                timeLeft = 60 * 60;
                currentQuestion = 0;
                loadQuestion();
            }
        }

        // Initial Load
        loadQuestion();
    </script>
</body>
</html>
