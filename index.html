<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOCFL Practice Pro - Band B1</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6;
            -webkit-tap-highlight-color: transparent;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .editor-content:focus {
            outline: none;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 10px;
        }
        .active-q {
            background-color: #1D4ED8 !important;
            color: white !important;
            transform: scale(1.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        .answered-q {
            background-color: #DBEAFE !important;
            color: #1E40AF !important;
            border-color: #BFDBFE !important;
        }
        /* Mobile Drawer Animation */
        .drawer-open {
            transform: translateX(0) !important;
        }
        .overlay-active {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .watermark {
            opacity: 0.15;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col lg:flex-row text-gray-800">

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 opacity-0 pointer-events-none transition-opacity duration-300 lg:hidden"></div>
    
    <!-- Review Modal Overlay -->
    <div id="review-modal" class="fixed inset-0 bg-black/60 z-[60] opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="review-content">
            <div class="p-4 lg:p-6 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="clipboard-check" class="w-6 h-6 text-blue-700"></i>
                    Bảng đáp án tổng quát
                </h3>
                <button onclick="toggleReviewModal()" class="p-2 hover:bg-gray-200 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-gray-500"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 lg:p-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="review-list">
                    <!-- Review items will be injected here -->
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                <button onclick="toggleReviewModal()" class="px-6 py-2 bg-blue-700 text-white rounded-lg font-bold hover:bg-blue-800 transition-all shadow-md">
                    Hoàn tất
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col border-r border-gray-200 bg-white overflow-hidden relative">
        <!-- Header -->
        <header class="h-14 lg:h-16 border-b border-gray-100 flex items-center justify-between px-4 lg:px-8 bg-white shrink-0 shadow-sm z-30">
                <div class="flex items-center gap-2 lg:gap-3">
                    <div class="bg-blue-700 p-1.5 lg:p-2 rounded-lg text-white">
                        <i data-lucide="file-text" class="w-4 h-4 lg:w-5 lg:h-5"></i>
                    </div>
                    <div class="flex flex-col -space-y-1">
                        <h1 class="text-base lg:text-xl font-bold tracking-tight">TOCFL <span class="text-blue-700">B1</span></h1>
                        <span class="text-[8px] lg:text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Tiếng Trung Quỳnh Phượng</span>
                    </div>
                </div>
            
            <div class="flex items-center gap-2 lg:gap-4">
                <button onclick="toggleEditMode()" id="edit-mode-btn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all font-semibold text-xs lg:text-sm">
                    <i data-lucide="edit" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Chỉnh sửa</span>
                </button>
                <button onclick="toggleReviewModal()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 hover:bg-blue-100 transition-all font-semibold text-xs lg:text-sm">
                    <i data-lucide="list-checks" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Bảng đáp án</span>
                </button>
                <div id="timer-container" class="flex items-center gap-1.5 lg:gap-2 px-3 lg:px-4 py-1.5 rounded-full font-mono text-sm lg:text-lg font-semibold bg-gray-50 text-gray-700">
                    <i data-lucide="clock" class="w-3.5 h-3.5 lg:w-5 lg:h-5"></i>
                    <span id="timer">60:00</span>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg">
                    <i data-lucide="edit-3" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Question Grid -->
        <div class="p-3 lg:p-6 bg-gray-50 border-b border-gray-200 shrink-0 overflow-x-auto">
            <div id="question-grid" class="grid grid-cols-6 sm:grid-cols-10 gap-1.5 lg:gap-2 max-w-4xl mx-auto min-w-fit">
                <!-- Grid items will be injected here -->
            </div>
        </div>

        <!-- Question Area -->
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 flex flex-col items-center">
            <div class="w-full max-w-3xl space-y-6 lg:space-y-8">
                <div class="flex items-center justify-between border-b border-gray-100 pb-3 lg:pb-4">
                    <h2 id="question-title" class="text-2xl lg:text-3xl font-serif italic text-gray-900">Câu 1</h2>
                    <div id="status-badge" class="text-xs lg:text-sm font-medium text-gray-400">Chưa trả lời</div>
                </div>

                <!-- Media Section -->
                <div class="flex flex-col gap-4 lg:gap-6">
                    <!-- Audio Upload -->
                    <div class="space-y-4 relative">
                        <label for="audio-input" class="flex flex-col items-center justify-center w-full h-20 lg:h-24 border-2 border-dashed border-gray-300 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer group relative overflow-hidden">
                            <div id="audio-placeholder" class="flex flex-col items-center gap-2 text-gray-400 group-hover:text-blue-700">
                                <i data-lucide="headphones" class="w-6 h-6 lg:w-8 lg:h-8"></i>
                                <span class="text-xs lg:text-sm font-medium">Tải âm thanh lên</span>
                            </div>
                            <div id="audio-player-container" class="hidden w-full p-4 flex flex-col items-center gap-2" onclick="event.stopPropagation()">
                                <div class="flex items-center gap-4 w-full">
                                    <i data-lucide="headphones" class="w-6 h-6 text-blue-700 shrink-0"></i>
                                    <audio id="audio-player" controls class="w-full h-10"></audio>
                                </div>
                                <button onclick="document.getElementById('audio-input').click()" class="text-[10px] text-blue-700 hover:underline font-medium">Thay đổi âm thanh</button>
                            </div>
                        </label>
                        <input type="file" id="audio-input" class="hidden" accept="audio/*">
                        <button id="remove-audio" onclick="removeMedia('audio')" class="hidden absolute top-2 right-2 p-1.5 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors z-10 shadow-sm">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <!-- Image Upload -->
                    <div class="space-y-4 relative">
                        <label for="image-input" class="flex flex-col items-center justify-center w-full h-48 lg:h-64 border-2 border-dashed border-gray-300 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer group relative overflow-hidden">
                            <div id="image-placeholder" class="flex flex-col items-center gap-2 text-gray-400 group-hover:text-blue-700">
                                <i data-lucide="image" class="w-8 h-8 lg:w-10 lg:h-10"></i>
                                <span class="text-xs lg:text-sm font-medium">Tải ảnh lên (Hình chữ nhật)</span>
                            </div>
                            <img id="image-preview" class="hidden w-full h-full object-contain p-2" src="" alt="Preview">
                        </label>
                        <input type="file" id="image-input" class="hidden" accept="image/*">
                        <button id="remove-image" onclick="removeMedia('image')" class="hidden absolute top-2 right-2 p-1.5 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors z-10 shadow-sm">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Options -->
                <div class="flex flex-col gap-3 lg:gap-4 pt-2 lg:pt-4">
                    <div class="flex items-center justify-between">
                        <p class="text-[10px] lg:text-sm font-semibold uppercase tracking-wider text-gray-400">Chọn đáp án</p>
                        <div id="correct-answer-indicator" class="hidden text-xs font-bold text-green-600 flex items-center gap-1">
                            <i data-lucide="check-circle" class="w-3 h-3"></i>
                            Đáp án đúng: <span id="correct-answer-text">-</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-3 lg:gap-4" id="options-container">
                        <!-- Options will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Navigation -->
        <footer class="h-16 lg:h-20 border-t border-gray-200 px-4 lg:px-8 flex items-center justify-between bg-white shrink-0 z-30">
            <button onclick="prevQuestion()" id="prev-btn" class="flex items-center gap-1 lg:gap-2 px-3 lg:px-6 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 disabled:opacity-30 transition-all text-sm lg:text-base">
                <i data-lucide="chevron-left" class="w-4 h-4 lg:w-5 lg:h-5"></i>
                <span class="hidden sm:inline">Quay lại</span>
            </button>
            
            <div id="progress-text" class="text-[10px] lg:text-sm font-medium text-gray-400">
                0 / 30
            </div>

            <button onclick="nextQuestion()" id="next-btn" class="flex items-center gap-1 lg:gap-2 px-3 lg:px-6 py-2 rounded-lg font-medium bg-blue-700 text-white hover:bg-blue-800 disabled:opacity-30 transition-all shadow-md text-sm lg:text-base">
                <span class="hidden sm:inline">Tiếp tục</span>
                <i data-lucide="chevron-right" class="w-4 h-4 lg:w-5 lg:h-5"></i>
            </button>
        </footer>
    </main>

    <!-- Sidebar: Notes (Mobile Drawer) -->
    <aside id="notes-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-80 lg:relative lg:translate-x-0 translate-x-full transition-transform duration-300 ease-in-out flex flex-col bg-white shadow-2xl z-50 shrink-0">
        <div class="h-14 lg:h-16 border-b border-gray-100 flex items-center justify-between px-6 bg-gray-50/50 shrink-0">
            <h2 class="font-bold text-gray-700 flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4 text-blue-700"></i>
                Ghi chú
            </h2>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="flex items-center gap-1 p-2 border-b border-gray-100 bg-white shrink-0 overflow-x-auto">
            <button onclick="format('bold')" class="p-2 hover:bg-gray-100 rounded transition-colors"><i data-lucide="bold" class="w-4 h-4"></i></button>
            <button onclick="format('italic')" class="p-2 hover:bg-gray-100 rounded transition-colors"><i data-lucide="italic" class="w-4 h-4"></i></button>
            <button onclick="format('underline')" class="p-2 hover:bg-gray-100 rounded transition-colors"><i data-lucide="underline" class="w-4 h-4"></i></button>
            <div class="flex-1"></div>
            <button onclick="resetPractice()" class="lg:hidden p-2 text-red-500 hover:bg-red-50 rounded transition-colors" title="Reset">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
            </button>
            <div class="p-2 text-blue-700">
                <i data-lucide="save" class="w-4 h-4"></i>
            </div>
        </div>

        <div id="editor" contenteditable="true" class="flex-1 p-4 lg:p-6 editor-content overflow-y-auto text-sm leading-relaxed text-gray-600" placeholder="Nhập ghi chú tại đây..."></div>
        
        <div class="p-4 bg-gray-50 border-t border-gray-100 shrink-0">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold text-center">
                Tự động lưu
            </p>
        </div>
    </aside>

    <script>
        // State Management
        let currentQuestion = 0;
        const totalQuestions = 30;
        let answers = JSON.parse(localStorage.getItem('tocfl_answers') || '{}');
        let optionTexts = JSON.parse(localStorage.getItem('tocfl_option_texts') || '{}');
        let correctAnswers = JSON.parse(localStorage.getItem('tocfl_correct_answers') || '{}');
        let imageUrls = JSON.parse(localStorage.getItem('tocfl_image_urls') || '{}');
        let audioUrls = JSON.parse(localStorage.getItem('tocfl_audio_urls') || '{}');
        let notes = localStorage.getItem('tocfl_notes') || '';
        let isEditMode = false;
        let timeLeft = 60 * 60;

        // Initialize Lucide Icons
        lucide.createIcons();

        // Initialize Grid
        const gridContainer = document.getElementById('question-grid');
        for (let i = 0; i < totalQuestions; i++) {
            const btn = document.createElement('button');
            btn.id = `grid-btn-${i}`;
            btn.innerText = i + 1;
            btn.className = 'w-8 h-8 lg:w-9 lg:h-9 rounded-md text-[10px] lg:text-xs font-medium transition-all duration-200 flex items-center justify-center bg-white text-gray-400 border border-gray-200 active:scale-95';
            btn.onclick = () => goToQuestion(i);
            gridContainer.appendChild(btn);
        }

        // Timer Logic
        const timerDisplay = document.getElementById('timer');
        const timerContainer = document.getElementById('timer-container');
        setInterval(() => {
            if (timeLeft <= 0) return;
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.innerText = `${m}:${s < 10 ? '0' + s : s}`;
            
            if (timeLeft < 300) {
                timerContainer.classList.add('bg-red-50', 'text-red-600', 'animate-pulse');
            }
        }, 1000);

        // Editor Logic
        const editor = document.getElementById('editor');
        editor.innerHTML = notes;
        editor.oninput = () => {
            localStorage.setItem('tocfl_notes', editor.innerHTML);
        };

        function format(cmd) {
            document.execCommand(cmd, false, null);
        }

        // Sidebar Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('notes-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('drawer-open');
            overlay.classList.toggle('overlay-active');
        }

        // Review Modal Logic
        function toggleReviewModal() {
            const modal = document.getElementById('review-modal');
            const content = document.getElementById('review-content');
            const isOpening = modal.classList.contains('pointer-events-none');

            if (isOpening) {
                renderReviewList();
                modal.classList.remove('opacity-0', 'pointer-events-none');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                content.classList.add('scale-95');
                content.classList.remove('scale-100');
            }
        }

        function renderReviewList() {
            const list = document.getElementById('review-list');
            list.innerHTML = '';
            
            for (let i = 0; i < totalQuestions; i++) {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100';
                
                const label = document.createElement('span');
                label.className = 'font-bold text-gray-600 text-sm';
                label.innerText = `Câu ${i + 1}:`;
                
                const optsContainer = document.createElement('div');
                optsContainer.className = 'flex gap-1';
                
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    const btn = document.createElement('button');
                    btn.innerText = opt;
                    const isSelected = answers[i] === opt;
                    btn.className = `w-8 h-8 rounded-md text-xs font-bold transition-all ${
                        isSelected 
                        ? 'bg-blue-700 text-white shadow-sm' 
                        : 'bg-white text-gray-400 border border-gray-200 hover:border-blue-300'
                    }`;
                    btn.onclick = () => {
                        updateAnswerFromReview(i, opt);
                    };
                    optsContainer.appendChild(btn);
                });
                
                item.appendChild(label);
                item.appendChild(optsContainer);
                list.appendChild(item);
            }
        }

        function updateAnswerFromReview(index, opt) {
            answers[index] = opt;
            localStorage.setItem('tocfl_answers', JSON.stringify(answers));
            renderReviewList();
            loadQuestion(); // Sync main view if needed
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('edit-mode-btn');
            if (isEditMode) {
                btn.classList.replace('bg-gray-100', 'bg-blue-700');
                btn.classList.replace('text-gray-600', 'text-white');
            } else {
                btn.classList.replace('bg-blue-700', 'bg-gray-100');
                btn.classList.replace('text-white', 'text-gray-600');
            }
            loadQuestion();
        }

        // Question Navigation
        function loadQuestion() {
            document.getElementById('question-title').innerText = `Câu ${currentQuestion + 1}`;
            
            // Update Grid Styles
            for (let i = 0; i < totalQuestions; i++) {
                const btn = document.getElementById(`grid-btn-${i}`);
                btn.classList.remove('active-q', 'answered-q');
                if (answers[i]) btn.classList.add('answered-q');
                if (i === currentQuestion) btn.classList.add('active-q');
            }

            // Update Status Badge
            const badge = document.getElementById('status-badge');
            const isCorrect = answers[currentQuestion] === correctAnswers[currentQuestion];
            
            if (answers[currentQuestion]) {
                if (correctAnswers[currentQuestion]) {
                    badge.innerHTML = isCorrect 
                        ? `<span class="flex items-center gap-1 text-green-600 font-bold"><i data-lucide="check-circle" class="w-4 h-4"></i> Chính xác</span>`
                        : `<span class="flex items-center gap-1 text-red-500 font-bold"><i data-lucide="x-circle" class="w-4 h-4"></i> Sai rồi</span>`;
                } else {
                    badge.innerHTML = `<span class="flex items-center gap-1 text-blue-700 font-medium"><i data-lucide="check-circle-2" class="w-3 h-3 lg:w-4 lg:h-4"></i> Đã chọn ${answers[currentQuestion]}</span>`;
                }
            } else {
                badge.innerText = 'Chưa trả lời';
            }
            lucide.createIcons();

            // Render Options
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            ['A', 'B', 'C', 'D'].forEach(opt => {
                const isSelected = answers[currentQuestion] === opt;
                const isCorrectOpt = correctAnswers[currentQuestion] === opt;
                const text = (optionTexts[currentQuestion] && optionTexts[currentQuestion][opt]) || '';

                const wrapper = document.createElement('div');
                let bgClass = 'border-gray-100 bg-white hover:border-gray-300';
                
                if (isSelected) {
                    if (correctAnswers[currentQuestion]) {
                        bgClass = isCorrect ? 'border-green-600 bg-green-50 shadow-md' : 'border-red-500 bg-red-50 shadow-md';
                    } else {
                        bgClass = 'border-blue-700 bg-blue-50 shadow-md';
                    }
                }

                wrapper.className = `group relative flex items-center gap-4 p-4 rounded-xl border-2 transition-all duration-200 ${bgClass}`;

                // Option Label (A, B, C, D)
                const label = document.createElement('button');
                label.innerText = opt;
                label.onclick = () => selectOption(opt);
                
                let labelClass = 'bg-gray-100 text-gray-500 group-hover:bg-gray-200';
                if (isSelected) {
                    if (correctAnswers[currentQuestion]) {
                        labelClass = isCorrect ? 'bg-green-600 text-white' : 'bg-red-500 text-white';
                    } else {
                        labelClass = 'bg-blue-700 text-white';
                    }
                }

                label.className = `shrink-0 w-10 h-10 lg:w-12 lg:h-12 rounded-lg text-lg lg:text-xl font-bold flex items-center justify-center transition-all ${labelClass}`;

                // Option Content
                if (isEditMode) {
                    const input = document.createElement('textarea');
                    input.placeholder = `Nhập nội dung đáp án ${opt}...`;
                    input.value = text;
                    input.className = 'flex-1 bg-transparent border-none focus:ring-0 text-sm lg:text-base resize-none py-1 h-auto min-h-[40px]';
                    input.oninput = (e) => {
                        if (!optionTexts[currentQuestion]) optionTexts[currentQuestion] = {};
                        optionTexts[currentQuestion][opt] = e.target.value;
                        localStorage.setItem('tocfl_option_texts', JSON.stringify(optionTexts));
                    };
                    wrapper.appendChild(label);
                    wrapper.appendChild(input);

                    // Set Correct Button
                    const setCorrectBtn = document.createElement('button');
                    setCorrectBtn.innerHTML = `<i data-lucide="${isCorrectOpt ? 'check-circle' : 'circle'}" class="w-5 h-5"></i>`;
                    setCorrectBtn.className = `p-2 rounded-lg transition-colors ${isCorrectOpt ? 'text-green-600' : 'text-gray-300 hover:text-green-500'}`;
                    setCorrectBtn.title = "Đặt làm đáp án đúng";
                    setCorrectBtn.onclick = () => {
                        correctAnswers[currentQuestion] = opt;
                        localStorage.setItem('tocfl_correct_answers', JSON.stringify(correctAnswers));
                        loadQuestion();
                    };
                    wrapper.appendChild(setCorrectBtn);
                } else {
                    const content = document.createElement('div');
                    content.className = 'flex-1 text-sm lg:text-base text-gray-700 cursor-pointer py-1';
                    content.innerText = text || `(Trống)`;
                    content.onclick = () => selectOption(opt);
                    wrapper.appendChild(label);
                    wrapper.appendChild(content);

                    if (isSelected && correctAnswers[currentQuestion]) {
                        const icon = document.createElement('div');
                        icon.innerHTML = `<i data-lucide="${isCorrect ? 'check' : 'x'}" class="w-5 h-5"></i>`;
                        icon.className = isCorrect ? 'text-green-600' : 'text-red-500';
                        wrapper.appendChild(icon);
                    }
                }

                optionsContainer.appendChild(wrapper);
            });
            lucide.createIcons();

            // Update Correct Answer Indicator
            const indicator = document.getElementById('correct-answer-indicator');
            const indicatorText = document.getElementById('correct-answer-text');
            if (isEditMode && correctAnswers[currentQuestion]) {
                indicator.classList.remove('hidden');
                indicatorText.innerText = correctAnswers[currentQuestion];
            } else {
                indicator.classList.add('hidden');
            }

            // Update Media
            const imgPreview = document.getElementById('image-preview');
            const imgPlaceholder = document.getElementById('image-placeholder');
            const removeImgBtn = document.getElementById('remove-image');
            if (imageUrls[currentQuestion]) {
                imgPreview.src = imageUrls[currentQuestion];
                imgPreview.classList.remove('hidden');
                imgPlaceholder.classList.add('hidden');
                removeImgBtn.classList.remove('hidden');
            } else {
                imgPreview.classList.add('hidden');
                imgPlaceholder.classList.remove('hidden');
                removeImgBtn.classList.add('hidden');
            }

            const audioPlayer = document.getElementById('audio-player');
            const audioContainer = document.getElementById('audio-player-container');
            const audioPlaceholder = document.getElementById('audio-placeholder');
            const removeAudioBtn = document.getElementById('remove-audio');
            
            audioPlayer.pause();

            if (audioUrls[currentQuestion]) {
                audioPlayer.src = audioUrls[currentQuestion];
                audioContainer.classList.remove('hidden');
                audioPlaceholder.classList.add('hidden');
                removeAudioBtn.classList.remove('hidden');
            } else {
                audioContainer.classList.add('hidden');
                audioPlaceholder.classList.remove('hidden');
                removeAudioBtn.classList.add('hidden');
                audioPlayer.src = '';
            }

            // Update Progress
            document.getElementById('progress-text').innerText = `${Object.keys(answers).length} / ${totalQuestions}`;

            // Update Buttons
            document.getElementById('prev-btn').disabled = currentQuestion === 0;
            document.getElementById('next-btn').disabled = currentQuestion === totalQuestions - 1;
        }

        function goToQuestion(index) {
            currentQuestion = index;
            loadQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < totalQuestions - 1) {
                currentQuestion++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function selectOption(opt) {
            answers[currentQuestion] = opt;
            localStorage.setItem('tocfl_answers', JSON.stringify(answers));
            loadQuestion();
        }

        // File Uploads
        document.getElementById('image-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageUrls[currentQuestion] = event.target.result;
                    localStorage.setItem('tocfl_image_urls', JSON.stringify(imageUrls));
                    loadQuestion();
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('audio-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    audioUrls[currentQuestion] = event.target.result;
                    localStorage.setItem('tocfl_audio_urls', JSON.stringify(audioUrls));
                    loadQuestion();
                };
                reader.readAsDataURL(file);
            }
        };

        function removeMedia(type) {
            if (type === 'image') {
                delete imageUrls[currentQuestion];
                localStorage.setItem('tocfl_image_urls', JSON.stringify(imageUrls));
            } else {
                delete audioUrls[currentQuestion];
                localStorage.setItem('tocfl_audio_urls', JSON.stringify(audioUrls));
            }
            loadQuestion();
        }

        function resetPractice() {
            if (confirm('Bạn có chắc chắn muốn xóa toàn bộ kết quả?')) {
                answers = {};
                optionTexts = {};
                correctAnswers = {};
                imageUrls = {};
                audioUrls = {};
                localStorage.removeItem('tocfl_answers');
                localStorage.removeItem('tocfl_option_texts');
                localStorage.removeItem('tocfl_correct_answers');
                localStorage.removeItem('tocfl_image_urls');
                localStorage.removeItem('tocfl_audio_urls');
                localStorage.removeItem('tocfl_notes');
                editor.innerHTML = '';
                timeLeft = 60 * 60;
                currentQuestion = 0;
                loadQuestion();
            }
        }

        // Initial Load
        loadQuestion();
    </script>
</body>
</html>
